<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Voice Agent</title>
<style>
  :root {
    --bg:        #0d0f14;
    --surface:   #161920;
    --border:    #252830;
    --text:      #e8eaf0;
    --muted:     #656a7a;
    --accent:    #5b7cfa;
    --accent-lo: rgba(91,124,250,.12);
    --green:     #3ecf8e;
    --red:       #f0614a;
    --radius:    14px;
    --mono:      'JetBrains Mono', 'Fira Mono', monospace;
    --sans:      'Inter', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 32px;
  }

  .orb-wrap {
    position: relative;
    width: 140px;
    height: 140px;
    cursor: pointer;
    user-select: none;
  }

  .orb {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 36%, #7b9bff 0%, #3a5af0 45%, #1a2a8f 100%);
    box-shadow: 0 0 0 0 rgba(91,124,250,.4);
    transition: transform .15s ease, box-shadow .15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .orb svg { opacity: .85; }
  .orb-wrap:hover .orb { transform: scale(1.05); }

  .orb-wrap.idle .orb { animation: idle-pulse 3s ease-in-out infinite; }
  @keyframes idle-pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(91,124,250,.3); }
    50%      { box-shadow: 0 0 0 18px rgba(91,124,250,.0); }
  }

  .orb-wrap.listening .orb {
    animation: listen-scale 0.7s ease-in-out infinite alternate;
    box-shadow: 0 0 0 10px rgba(91,124,250,.2), 0 0 0 22px rgba(91,124,250,.08);
  }
  @keyframes listen-scale {
    from { transform: scale(1.0); }
    to   { transform: scale(1.06); }
  }

  .orb-wrap.speaking .orb {
    background: radial-gradient(circle at 38% 36%, #6dffc4 0%, #2aaa70 45%, #0a5e3c 100%);
    box-shadow: 0 0 0 12px rgba(62,207,142,.18), 0 0 0 26px rgba(62,207,142,.06);
    animation: speak-pulse 0.6s ease-in-out infinite alternate;
  }
  @keyframes speak-pulse {
    from { transform: scale(1.0); box-shadow: 0 0 0 8px rgba(62,207,142,.2); }
    to   { transform: scale(1.07); box-shadow: 0 0 0 24px rgba(62,207,142,.04); }
  }

  .orb-wrap.error .orb {
    background: radial-gradient(circle at 38% 36%, #ff8f80 0%, #d63520 45%, #7a1008 100%);
  }

  .status-label {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    min-height: 20px;
    transition: color .3s;
  }
  .status-label.active   { color: var(--accent); }
  .status-label.speaking { color: var(--green); }
  .status-label.error    { color: var(--red); }

  .transcript-wrap {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .transcript-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .transcript-body {
    height: 220px;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  .transcript-body::-webkit-scrollbar { width: 4px; }
  .transcript-body::-webkit-scrollbar-track { background: transparent; }
  .transcript-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { display: flex; flex-direction: column; gap: 3px; max-width: 88%; }
  .msg.user  { align-self: flex-end; align-items: flex-end; }
  .msg.agent { align-self: flex-start; align-items: flex-start; }

  .msg-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .msg-bubble {
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.5;
  }

  .msg.user  .msg-bubble { background: var(--accent-lo); border: 1px solid var(--accent); color: var(--text); }
  .msg.agent .msg-bubble { background: rgba(255,255,255,.04); border: 1px solid var(--border); color: var(--text); }

  .msg-bubble.interrupted { opacity: .55; }
  .msg-bubble.interrupted::after {
    content: " (interrupted)";
    font-size: 11px;
    font-style: italic;
    color: var(--muted);
  }

  .controls { display: flex; gap: 12px; align-items: center; }

  .btn {
    padding: 10px 22px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s, border-color .15s, opacity .15s;
  }
  .btn:hover    { background: var(--border); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn.primary  { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: #4a6ee8; }
  .btn.danger   { background: rgba(240,97,74,.12); border-color: var(--red); color: var(--red); }
  .btn.danger:hover  { background: rgba(240,97,74,.22); }

  .vol-bar-wrap {
    width: 100%;
    max-width: 560px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    opacity: 0;
    transition: opacity .3s;
  }
  .vol-bar-wrap.active { opacity: 1; }
  .vol-bar {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 2px;
    transition: width .05s linear;
  }

  .footer { font-size: 11px; color: var(--muted); text-align: center; }
</style>
</head>
<body>

<div class="orb-wrap idle" id="orb" title="Click to start / stop">
  <div class="orb">
    <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
      <rect x="16" y="6" width="12" height="18" rx="6" fill="white"/>
      <path d="M9 22c0 7.18 5.82 13 13 13s13-5.82 13-13" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      <line x1="22" y1="35" x2="22" y2="40" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="16" y1="40" x2="28" y2="40" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
    </svg>
  </div>
</div>

<div class="status-label" id="statusLabel">Click the orb to start</div>

<div class="vol-bar-wrap" id="volWrap">
  <div class="vol-bar" id="volBar"></div>
</div>

<div class="transcript-wrap">
  <div class="transcript-header">Transcript</div>
  <div class="transcript-body" id="transcriptBody">
    <div style="color:var(--muted);font-size:13px;margin:auto;text-align:center;">
      Your conversation will appear here
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn primary" id="startBtn">Start</button>
  <button class="btn danger"  id="stopBtn" disabled>End Session</button>
</div>

<div class="footer">WebRTC · Deepgram Nova-3 · GPT-4.1-mini · Cartesia Sonic-2</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let ws          = null;
let pc          = null;
let localStream = null;
let micCtx      = null;
let analyser    = null;
let volRaf      = null;
let firstMsg    = true;

// ─── TTS playback (raw PCM s16le from Cartesia SSE) ──────────────────────────
// Cartesia's SSE endpoint only supports raw PCM output (container=raw,
// encoding=pcm_s16le). We can't feed raw PCM into decodeAudioData() — that
// only accepts complete encoded files (mp3/wav/ogg). Instead we:
//   1. Convert each chunk's Int16 samples → Float32
//   2. Create an AudioBuffer directly (no decode needed — it's already PCM)
//   3. Schedule it gaplessly on a shared AudioContext using nextStartTime
//
// Turn-gating and barge-in logic (playGen, currentTurnId, masterGain) are
// identical to the previous mp3 version — only the chunk→AudioBuffer
// conversion changes.

let playCtx       = null;
let masterGain    = null;
let currentTurnId = -1;
let nextStartTime = 0;
let activeSources = [];
let turnMsgEl     = null;
let playGen       = 0;

// Sample rate sent by server in tts_start message (default 22050)
let ttsSampleRate = 22050;

const orb            = document.getElementById("orb");
const statusLabel    = document.getElementById("statusLabel");
const volWrap        = document.getElementById("volWrap");
const volBar         = document.getElementById("volBar");
const transcriptBody = document.getElementById("transcriptBody");
const startBtn       = document.getElementById("startBtn");
const stopBtn        = document.getElementById("stopBtn");

// ─── Helpers ──────────────────────────────────────────────────────────────────
function setStatus(text, cls = "") {
  statusLabel.textContent = text;
  statusLabel.className   = "status-label" + (cls ? ` ${cls}` : "");
}
function setOrbState(state) { orb.className = `orb-wrap ${state}`; }

function addMessage(text, speaker) {
  if (firstMsg) { transcriptBody.innerHTML = ""; firstMsg = false; }
  const d = document.createElement("div");
  d.className = `msg ${speaker}`;
  d.innerHTML = `
    <span class="msg-label">${speaker === "user" ? "You" : "Agent"}</span>
    <div class="msg-bubble">${escapeHtml(text)}</div>
  `;
  transcriptBody.appendChild(d);
  transcriptBody.scrollTop = transcriptBody.scrollHeight;
  return d.querySelector(".msg-bubble");
}

function markBubbleInterrupted(el) { if (el) el.classList.add("interrupted"); }
function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ─── Input volume meter ───────────────────────────────────────────────────────
function startVolMeter(stream) {
  micCtx   = new AudioContext();
  analyser = micCtx.createAnalyser();
  analyser.fftSize = 256;
  micCtx.createMediaStreamSource(stream).connect(analyser);
  const data = new Uint8Array(analyser.frequencyBinCount);
  volWrap.classList.add("active");
  function tick() {
    analyser.getByteFrequencyData(data);
    const avg = data.reduce((a,b) => a+b, 0) / data.length;
    volBar.style.width = Math.min(100, avg * 2) + "%";
    volRaf = requestAnimationFrame(tick);
  }
  volRaf = requestAnimationFrame(tick);
}

function stopVolMeter() {
  if (volRaf) cancelAnimationFrame(volRaf);
  volWrap.classList.remove("active");
  volBar.style.width = "0%";
  if (micCtx) { micCtx.close(); micCtx = null; }
}

// ─── AudioContext setup ───────────────────────────────────────────────────────
function ensurePlayCtx() {
  if (!playCtx) {
    playCtx    = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: ttsSampleRate });
    masterGain = playCtx.createGain();
    masterGain.gain.value = 1;
    masterGain.connect(playCtx.destination);
  }
  if (playCtx.state === "suspended") playCtx.resume().catch(() => {});
  return playCtx;
}

function stopAllActiveSources() {
  if (masterGain && playCtx) {
    masterGain.gain.cancelScheduledValues(playCtx.currentTime);
    masterGain.gain.setValueAtTime(0, playCtx.currentTime);
  }
  for (const src of activeSources) {
    try { src.stop(); } catch(e) {}
  }
  activeSources = [];
  if (masterGain && playCtx) {
    masterGain.gain.setValueAtTime(1, playCtx.currentTime);
  }
}

// ─── Convert raw pcm_s16le bytes → AudioBuffer (NO decodeAudioData needed) ───
// This is the KEY change from the mp3 version. Raw PCM doesn't need decoding —
// we just reinterpret the bytes as Int16 samples and normalize to Float32 [-1,1].
function pcmBytesToAudioBuffer(arrayBuffer, sampleRate) {
  const int16   = new Int16Array(arrayBuffer);
  const float32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) {
    float32[i] = int16[i] / 32768.0;   // normalize s16 → float [-1, 1]
  }
  const ctx    = ensurePlayCtx();
  const buffer = ctx.createBuffer(1, float32.length, sampleRate);
  buffer.copyToChannel(float32, 0);
  return buffer;
}

// ─── Schedule one PCM chunk for gapless playback ─────────────────────────────
function scheduleChunk(arrayBuffer, turnId, gen) {
  // Both checks must pass — gen covers the race between "chunk arrives" and
  // "interrupt fires", turnId covers cross-turn confusion.
  if (gen !== playGen || turnId !== currentTurnId) return;

  const ctx    = ensurePlayCtx();
  // Strip the 8-byte header [turn_id u32][seq u32] — remaining bytes are PCM
  const pcmBuf = arrayBuffer.slice(8);
  if (pcmBuf.byteLength === 0) return;

  const audioBuffer = pcmBytesToAudioBuffer(pcmBuf, ttsSampleRate);

  const source = ctx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(masterGain);

  const startAt  = Math.max(nextStartTime, ctx.currentTime);
  source.start(startAt);
  nextStartTime  = startAt + audioBuffer.duration;

  activeSources.push(source);
  source.onended = () => {
    activeSources = activeSources.filter(s => s !== source);
    // All chunks for this turn have finished playing → flip back to listening
    if (activeSources.length === 0 && turnId === currentTurnId && gen === playGen) {
      setOrbState("listening");
      setStatus("Listening…", "active");
    }
  };
}

// ─── TTS event handlers ───────────────────────────────────────────────────────
function onTtsStart(msg) {
  playGen += 1;

  // Update sample rate from server message (sent in tts_start)
  if (msg.sample_rate) ttsSampleRate = msg.sample_rate;

  if (turnMsgEl) markBubbleInterrupted(turnMsgEl);
  stopAllActiveSources();

  currentTurnId = msg.turn_id;
  const ctx     = ensurePlayCtx();
  nextStartTime = ctx.currentTime;
  turnMsgEl     = null;

  setOrbState("speaking");
  setStatus("Agent speaking…", "speaking");
}

function onTtsEnd(turnId) {
  if (turnId !== currentTurnId) return;
  if (activeSources.length === 0) {
    setOrbState("listening");
    setStatus("Listening…", "active");
  }
}

function onInterrupt(turnId) {
  playGen += 1;
  if (turnId === currentTurnId || turnId === -1) markBubbleInterrupted(turnMsgEl);
  stopAllActiveSources();
  setOrbState("listening");
  setStatus("Listening…", "active");
  currentTurnId = -1;
}

// ─── Binary message handler ───────────────────────────────────────────────────
// Raw PCM path: no async decode, no queue needed.
// pcmBytesToAudioBuffer() is synchronous so there's zero race window —
// the gen/turnId checks and the schedule happen in the same microtask.
function handleAudioChunk(buf) {
  if (buf.byteLength < 8) return;
  const view   = new DataView(buf);
  const turnId = view.getUint32(0, false);   // big-endian matches server ">II"
  if (turnId !== currentTurnId) return;      // stale turn — drop immediately
  scheduleChunk(buf, turnId, playGen);
}

function resetTtsPlaybackState() {
  playGen += 1;
  stopAllActiveSources();
  currentTurnId = -1;
  nextStartTime = 0;
  turnMsgEl     = null;
}

// ─── WebSocket ────────────────────────────────────────────────────────────────
async function openWebSocket() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
 // ws           = new WebSocket(`${proto}://${location.host}/ws`);
  ws           = new WebSocket(`${proto}://${location.host}/bmc/ws`);
  ws.binaryType = "arraybuffer";

  return new Promise((resolve, reject) => {
    ws.onopen  = () => resolve();
    ws.onerror = (e) => reject(e);

    ws.onmessage = async (ev) => {
      if (ev.data instanceof ArrayBuffer) {
        handleAudioChunk(ev.data);
        return;
      }
      const msg = JSON.parse(ev.data);
      if      (msg.type === "answer")     { await pc.setRemoteDescription(new RTCSessionDescription({ type: msg.sdp_type, sdp: msg.sdp })); }
      else if (msg.type === "transcript") { const b = addMessage(msg.text, msg.speaker); if (msg.speaker === "agent") turnMsgEl = b; }
      else if (msg.type === "tts_start")  { onTtsStart(msg); }
      else if (msg.type === "tts_end")    { onTtsEnd(msg.turn_id); }
      else if (msg.type === "interrupt")  { onInterrupt(msg.turn_id); }
    };

    ws.onclose = () => {
      setStatus("Disconnected", "error");
      setOrbState("idle");
      resetUI();
    };
  });
}

// ─── WebRTC ───────────────────────────────────────────────────────────────────
async function startWebRTC(stream) {
  pc = new RTCPeerConnection({
    iceServers: [
      { urls: "stun:stun.l.google.com:19302" },
      { urls: "stun:stun1.l.google.com:19302" },
    ]
  });

  stream.getAudioTracks().forEach(t => pc.addTrack(t, stream));

  pc.onicecandidate = ({ candidate }) => {
    if (candidate && ws?.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: "ice_candidate", candidate: candidate.toJSON() }));
    }
  };

  pc.onconnectionstatechange = () => {
    console.log("WebRTC:", pc.connectionState);
    if (pc.connectionState === "connected") {
      setStatus("Listening…", "active");
      setOrbState("listening");
    } else if (["failed","disconnected","closed"].includes(pc.connectionState)) {
      setStatus("Connection lost", "error");
      setOrbState("error");
    }
  };

  const offer = await pc.createOffer({ offerToReceiveAudio: false, offerToReceiveVideo: false });
  await pc.setLocalDescription(offer);
  ws.send(JSON.stringify({ type: "offer", sdp: offer.sdp, sdp_type: offer.type }));
}

// ─── Session start / stop ─────────────────────────────────────────────────────
async function startSession() {
  startBtn.disabled = true;
  setStatus("Requesting microphone…", "");

  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true, channelCount: 1, sampleRate: 16000 },
      video: false
    });
  } catch(e) {
    setStatus("Microphone access denied", "error");
    setOrbState("error");
    startBtn.disabled = false;
    return;
  }

  setStatus("Connecting…", "");
  ensurePlayCtx();   // create inside click gesture so autoplay is allowed

  try {
    await openWebSocket();
    await startWebRTC(localStream);
    startVolMeter(localStream);
    stopBtn.disabled = false;
    setOrbState("listening");
    setStatus("Connecting WebRTC…", "active");
  } catch(e) {
    console.error(e);
    setStatus("Connection failed — is the server running?", "error");
    setOrbState("error");
    startBtn.disabled = false;
  }
}

function resetUI() {
  startBtn.disabled = false;
  stopBtn.disabled  = true;
  setOrbState("idle");
}

async function stopSession() {
  stopBtn.disabled = true;
  if (ws)          { ws.send(JSON.stringify({ type: "close" })); ws.close(); ws = null; }
  if (pc)          { pc.close(); pc = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  stopVolMeter();
  resetTtsPlaybackState();
  if (playCtx) { playCtx.close(); playCtx = null; masterGain = null; }
  setStatus("Session ended", "");
  setOrbState("idle");
  resetUI();
}

// ─── Bind ─────────────────────────────────────────────────────────────────────
startBtn.addEventListener("click", startSession);
stopBtn.addEventListener("click",  stopSession);
orb.addEventListener("click", () => {
  if (startBtn.disabled && !stopBtn.disabled) stopSession();
  else if (!startBtn.disabled) startSession();
});
</script>
</body>
</html>
