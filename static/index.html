<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Voice Agent</title>
<style>
  /* ── Tokens ── */
  :root {
    --bg:        #0d0f14;
    --surface:   #161920;
    --border:    #252830;
    --text:      #e8eaf0;
    --muted:     #656a7a;
    --accent:    #5b7cfa;
    --accent-lo: rgba(91,124,250,.12);
    --green:     #3ecf8e;
    --red:       #f0614a;
    --radius:    14px;
    --mono:      'JetBrains Mono', 'Fira Mono', monospace;
    --sans:      'Inter', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 32px;
  }

  /* ── Orb ── */
  .orb-wrap {
    position: relative;
    width: 140px;
    height: 140px;
    cursor: pointer;
    user-select: none;
  }

  .orb {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 36%, #7b9bff 0%, #3a5af0 45%, #1a2a8f 100%);
    box-shadow: 0 0 0 0 rgba(91,124,250,.4);
    transition: transform .15s ease, box-shadow .15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .orb svg { opacity: .85; }

  .orb-wrap:hover .orb { transform: scale(1.05); }

  /* Idle pulse */
  .orb-wrap.idle .orb {
    animation: idle-pulse 3s ease-in-out infinite;
  }

  @keyframes idle-pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(91,124,250,.3); }
    50%      { box-shadow: 0 0 0 18px rgba(91,124,250,.0); }
  }

  /* Listening — ripples */
  .orb-wrap.listening .orb {
    animation: listen-scale 0.7s ease-in-out infinite alternate;
    box-shadow: 0 0 0 10px rgba(91,124,250,.2), 0 0 0 22px rgba(91,124,250,.08);
  }

  @keyframes listen-scale {
    from { transform: scale(1.0); }
    to   { transform: scale(1.06); }
  }

  /* Speaking — green glow */
  .orb-wrap.speaking .orb {
    background: radial-gradient(circle at 38% 36%, #6dffc4 0%, #2aaa70 45%, #0a5e3c 100%);
    box-shadow: 0 0 0 12px rgba(62,207,142,.18), 0 0 0 26px rgba(62,207,142,.06);
    animation: speak-pulse 0.6s ease-in-out infinite alternate;
  }

  @keyframes speak-pulse {
    from { transform: scale(1.0); box-shadow: 0 0 0 8px rgba(62,207,142,.2); }
    to   { transform: scale(1.07); box-shadow: 0 0 0 24px rgba(62,207,142,.04); }
  }

  /* Error — red */
  .orb-wrap.error .orb {
    background: radial-gradient(circle at 38% 36%, #ff8f80 0%, #d63520 45%, #7a1008 100%);
  }

  /* ── Status label ── */
  .status-label {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    min-height: 20px;
    transition: color .3s;
  }

  .status-label.active { color: var(--accent); }
  .status-label.speaking { color: var(--green); }
  .status-label.error { color: var(--red); }

  /* ── Transcript panel ── */
  .transcript-wrap {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .transcript-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .transcript-body {
    height: 220px;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  .transcript-body::-webkit-scrollbar { width: 4px; }
  .transcript-body::-webkit-scrollbar-track { background: transparent; }
  .transcript-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 3px;
    max-width: 88%;
  }

  .msg.user  { align-self: flex-end; align-items: flex-end; }
  .msg.agent { align-self: flex-start; align-items: flex-start; }

  .msg-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .msg-bubble {
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.5;
  }

  .msg.user  .msg-bubble {
    background: var(--accent-lo);
    border: 1px solid var(--accent);
    color: var(--text);
  }

  .msg.agent .msg-bubble {
    background: rgba(255,255,255,.04);
    border: 1px solid var(--border);
    color: var(--text);
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn {
    padding: 10px 22px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s, border-color .15s, opacity .15s;
  }

  .btn:hover   { background: var(--border); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn.primary:hover { background: #4a6ee8; }

  .btn.danger {
    background: rgba(240,97,74,.12);
    border-color: var(--red);
    color: var(--red);
  }
  .btn.danger:hover { background: rgba(240,97,74,.22); }

  /* ── Volume meter ── */
  .vol-bar-wrap {
    width: 100%;
    max-width: 560px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    opacity: 0;
    transition: opacity .3s;
  }
  .vol-bar-wrap.active { opacity: 1; }
  .vol-bar {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 2px;
    transition: width .05s linear;
  }

  /* ── Footer ── */
  .footer {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }
</style>
</head>
<body>

<!-- Orb -->
<div class="orb-wrap idle" id="orb" title="Click to start / stop">
  <div class="orb">
    <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
      <!-- Mic icon -->
      <rect x="16" y="6" width="12" height="18" rx="6" fill="white"/>
      <path d="M9 22c0 7.18 5.82 13 13 13s13-5.82 13-13" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      <line x1="22" y1="35" x2="22" y2="40" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="16" y1="40" x2="28" y2="40" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
    </svg>
  </div>
</div>

<!-- Status -->
<div class="status-label" id="statusLabel">Click the orb to start</div>

<!-- Volume meter -->
<div class="vol-bar-wrap" id="volWrap">
  <div class="vol-bar" id="volBar"></div>
</div>

<!-- Transcript -->
<div class="transcript-wrap">
  <div class="transcript-header">Transcript</div>
  <div class="transcript-body" id="transcriptBody">
    <div style="color:var(--muted);font-size:13px;margin:auto;text-align:center;">
      Your conversation will appear here
    </div>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <button class="btn primary" id="startBtn">Start</button>
  <button class="btn danger"  id="stopBtn" disabled>End Session</button>
</div>

<div class="footer">WebRTC · Deepgram Nova-3 · GPT-4.1-mini · OpenAI TTS-1</div>

<script>
// ─── State ─────────────────────────────────────────────────────────────────────
let ws          = null;
let pc          = null;
let localStream = null;
let audioCtx    = null;
let analyser    = null;
let volRaf      = null;
let audioQueue  = [];   // MP3 chunks buffered per TTS utterance
let receiving   = false;
let audioEl     = null; // current playing <audio>
let firstMsg    = true;

const orb            = document.getElementById("orb");
const statusLabel    = document.getElementById("statusLabel");
const volWrap        = document.getElementById("volWrap");
const volBar         = document.getElementById("volBar");
const transcriptBody = document.getElementById("transcriptBody");
const startBtn       = document.getElementById("startBtn");
const stopBtn        = document.getElementById("stopBtn");

// ─── Helpers ───────────────────────────────────────────────────────────────────
function setStatus(text, cls = "") {
  statusLabel.textContent = text;
  statusLabel.className   = "status-label" + (cls ? ` ${cls}` : "");
}

function setOrbState(state) {
  orb.className = `orb-wrap ${state}`;
}

function addMessage(text, speaker) {
  if (firstMsg) {
    transcriptBody.innerHTML = "";
    firstMsg = false;
  }
  const d = document.createElement("div");
  d.className = `msg ${speaker}`;
  d.innerHTML = `
    <span class="msg-label">${speaker === "user" ? "You" : "Agent"}</span>
    <div class="msg-bubble">${escapeHtml(text)}</div>
  `;
  transcriptBody.appendChild(d);
  transcriptBody.scrollTop = transcriptBody.scrollHeight;
}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ─── Volume meter ─────────────────────────────────────────────────────────────
function startVolMeter(stream) {
  audioCtx = new AudioContext();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  const src = audioCtx.createMediaStreamSource(stream);
  src.connect(analyser);
  const data = new Uint8Array(analyser.frequencyBinCount);
  volWrap.classList.add("active");

  function tick() {
    analyser.getByteFrequencyData(data);
    const avg = data.reduce((a, b) => a + b, 0) / data.length;
    volBar.style.width = Math.min(100, avg * 2) + "%";
    volRaf = requestAnimationFrame(tick);
  }
  volRaf = requestAnimationFrame(tick);
}

function stopVolMeter() {
  if (volRaf) cancelAnimationFrame(volRaf);
  volWrap.classList.remove("active");
  volBar.style.width = "0%";
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
}

// ─── TTS playback ─────────────────────────────────────────────────────────────
// We collect binary chunks, then play as a blob URL
function startTTSSession() {
  audioQueue = [];
  receiving  = true;
}

function appendTTSChunk(bytes) {
  if (receiving) audioQueue.push(bytes);
}

function stopInterruptTTS() {
  receiving = false;
  if (audioEl) {
    audioEl.pause();
    audioEl.src = "";
    audioEl = null;
  }
  audioQueue = [];
  setOrbState("listening");
  setStatus("Listening…", "active");
}

async function finishTTS() {
  receiving = false;
  if (!audioQueue.length) return;

  const blob = new Blob(audioQueue, { type: "audio/mpeg" });
  audioQueue  = [];
  const url   = URL.createObjectURL(blob);
  audioEl     = new Audio(url);

  setOrbState("speaking");
  setStatus("Agent speaking…", "speaking");

  audioEl.onended = () => {
    URL.revokeObjectURL(url);
    audioEl = null;
    setOrbState("listening");
    setStatus("Listening…", "active");
  };

  try {
    await audioEl.play();
  } catch(e) {
    console.warn("Autoplay blocked:", e);
    // Show a "tap to hear" message
    setStatus("Tap to hear response", "active");
    audioEl.onclick = () => audioEl.play();
  }
}

// ─── WebSocket ────────────────────────────────────────────────────────────────
async function openWebSocket() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  const url   = `${proto}://${location.host}/ws`;
  ws          = new WebSocket(url);
  ws.binaryType = "arraybuffer";

  return new Promise((resolve, reject) => {
    ws.onopen    = () => resolve();
    ws.onerror   = (e) => reject(e);

    ws.onmessage = async (ev) => {
      if (ev.data instanceof ArrayBuffer) {
        // Binary = TTS audio chunk
        appendTTSChunk(new Uint8Array(ev.data));
        return;
      }
      const msg = JSON.parse(ev.data);

      if (msg.type === "answer") {
        const answer = new RTCSessionDescription({ type: msg.sdp_type, sdp: msg.sdp });
        await pc.setRemoteDescription(answer);

      } else if (msg.type === "transcript") {
        addMessage(msg.text, msg.speaker);

      } else if (msg.type === "tts_start") {
        startTTSSession();

      } else if (msg.type === "tts_end") {
        await finishTTS();

      } else if (msg.type === "interrupt") {
        stopInterruptTTS();
      }
    };

    ws.onclose = () => {
      setStatus("Disconnected", "error");
      setOrbState("idle");
      resetUI();
    };
  });
}

// ─── WebRTC ────────────────────────────────────────────────────────────────────
async function startWebRTC(stream) {
  pc = new RTCPeerConnection({
    iceServers: [
      { urls: "stun:stun.l.google.com:19302" },
      { urls: "stun:stun1.l.google.com:19302" },
    ]
  });

  // Add mic track
  stream.getAudioTracks().forEach(t => pc.addTrack(t, stream));

  // ICE candidate trickle
  pc.onicecandidate = ({ candidate }) => {
    if (candidate && ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({
        type:      "ice_candidate",
        candidate: candidate.toJSON(),
      }));
    }
  };

  pc.onconnectionstatechange = () => {
    console.log("WebRTC state:", pc.connectionState);
    if (pc.connectionState === "connected") {
      setStatus("Listening…", "active");
      setOrbState("listening");
    } else if (["failed","disconnected","closed"].includes(pc.connectionState)) {
      setStatus("Connection lost", "error");
      setOrbState("error");
    }
  };

  // Create offer
  const offer = await pc.createOffer({ offerToReceiveAudio: false, offerToReceiveVideo: false });
  await pc.setLocalDescription(offer);
  ws.send(JSON.stringify({ type: "offer", sdp: offer.sdp, sdp_type: offer.type }));
}

// ─── Session start / stop ─────────────────────────────────────────────────────
async function startSession() {
  startBtn.disabled = true;
  setStatus("Requesting microphone…", "");

  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation:   true,
        noiseSuppression:   true,
        autoGainControl:    true,
        channelCount:       1,
        sampleRate:         16000,
      },
      video: false
    });
  } catch(e) {
    setStatus("Microphone access denied", "error");
    setOrbState("error");
    startBtn.disabled = false;
    return;
  }

  setStatus("Connecting…", "");

  try {
    await openWebSocket();
    await startWebRTC(localStream);
    startVolMeter(localStream);
    stopBtn.disabled = false;
    setOrbState("listening");
    setStatus("Connecting WebRTC…", "active");
  } catch(e) {
    console.error(e);
    setStatus("Connection failed — is the server running?", "error");
    setOrbState("error");
    startBtn.disabled = false;
  }
}

function resetUI() {
  startBtn.disabled = false;
  stopBtn.disabled  = true;
  setOrbState("idle");
}

async function stopSession() {
  stopBtn.disabled = true;
  if (ws) { ws.send(JSON.stringify({ type: "close" })); ws.close(); ws = null; }
  if (pc) { pc.close(); pc = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  stopVolMeter();
  stopInterruptTTS();
  setStatus("Session ended", "");
  setOrbState("idle");
  resetUI();
}

// ─── Bind ─────────────────────────────────────────────────────────────────────
startBtn.addEventListener("click", startSession);
stopBtn.addEventListener("click",  stopSession);
orb.addEventListener("click", () => {
  if (startBtn.disabled && !stopBtn.disabled) stopSession();
  else if (!startBtn.disabled) startSession();
});
</script>
</body>
</html>
