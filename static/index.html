<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Voice Agent</title>
<style>
  /* ── Tokens ── */
  :root {
    --bg:        #0d0f14;
    --surface:   #161920;
    --border:    #252830;
    --text:      #e8eaf0;
    --muted:     #656a7a;
    --accent:    #5b7cfa;
    --accent-lo: rgba(91,124,250,.12);
    --green:     #3ecf8e;
    --red:       #f0614a;
    --radius:    14px;
    --mono:      'JetBrains Mono', 'Fira Mono', monospace;
    --sans:      'Inter', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 32px;
  }

  /* ── Orb ── */
  .orb-wrap {
    position: relative;
    width: 140px;
    height: 140px;
    cursor: pointer;
    user-select: none;
  }

  .orb {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 36%, #7b9bff 0%, #3a5af0 45%, #1a2a8f 100%);
    box-shadow: 0 0 0 0 rgba(91,124,250,.4);
    transition: transform .15s ease, box-shadow .15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .orb svg { opacity: .85; }

  .orb-wrap:hover .orb { transform: scale(1.05); }

  .orb-wrap.idle .orb {
    animation: idle-pulse 3s ease-in-out infinite;
  }

  @keyframes idle-pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(91,124,250,.3); }
    50%      { box-shadow: 0 0 0 18px rgba(91,124,250,.0); }
  }

  .orb-wrap.listening .orb {
    animation: listen-scale 0.7s ease-in-out infinite alternate;
    box-shadow: 0 0 0 10px rgba(91,124,250,.2), 0 0 0 22px rgba(91,124,250,.08);
  }

  @keyframes listen-scale {
    from { transform: scale(1.0); }
    to   { transform: scale(1.06); }
  }

  .orb-wrap.speaking .orb {
    background: radial-gradient(circle at 38% 36%, #6dffc4 0%, #2aaa70 45%, #0a5e3c 100%);
    box-shadow: 0 0 0 12px rgba(62,207,142,.18), 0 0 0 26px rgba(62,207,142,.06);
    animation: speak-pulse 0.6s ease-in-out infinite alternate;
  }

  @keyframes speak-pulse {
    from { transform: scale(1.0); box-shadow: 0 0 0 8px rgba(62,207,142,.2); }
    to   { transform: scale(1.07); box-shadow: 0 0 0 24px rgba(62,207,142,.04); }
  }

  .orb-wrap.error .orb {
    background: radial-gradient(circle at 38% 36%, #ff8f80 0%, #d63520 45%, #7a1008 100%);
  }

  /* ── Status label ── */
  .status-label {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    min-height: 20px;
    transition: color .3s;
  }

  .status-label.active { color: var(--accent); }
  .status-label.speaking { color: var(--green); }
  .status-label.error { color: var(--red); }

  /* ── Transcript panel ── */
  .transcript-wrap {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .transcript-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .transcript-body {
    height: 220px;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  .transcript-body::-webkit-scrollbar { width: 4px; }
  .transcript-body::-webkit-scrollbar-track { background: transparent; }
  .transcript-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 3px;
    max-width: 88%;
  }

  .msg.user  { align-self: flex-end; align-items: flex-end; }
  .msg.agent { align-self: flex-start; align-items: flex-start; }

  .msg-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .msg-bubble {
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.5;
  }

  .msg.user  .msg-bubble {
    background: var(--accent-lo);
    border: 1px solid var(--accent);
    color: var(--text);
  }

  .msg.agent .msg-bubble {
    background: rgba(255,255,255,.04);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .msg-bubble.interrupted {
    opacity: .55;
  }
  .msg-bubble.interrupted::after {
    content: " (interrupted)";
    font-size: 11px;
    font-style: italic;
    color: var(--muted);
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn {
    padding: 10px 22px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s, border-color .15s, opacity .15s;
  }

  .btn:hover   { background: var(--border); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn.primary:hover { background: #4a6ee8; }

  .btn.danger {
    background: rgba(240,97,74,.12);
    border-color: var(--red);
    color: var(--red);
  }
  .btn.danger:hover { background: rgba(240,97,74,.22); }

  /* ── Volume meter ── */
  .vol-bar-wrap {
    width: 100%;
    max-width: 560px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    opacity: 0;
    transition: opacity .3s;
  }
  .vol-bar-wrap.active { opacity: 1; }
  .vol-bar {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 2px;
    transition: width .05s linear;
  }

  /* ── Footer ── */
  .footer {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }
</style>
</head>
<body>

<!-- Orb -->
<div class="orb-wrap idle" id="orb" title="Click to start / stop">
  <div class="orb">
    <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
      <rect x="16" y="6" width="12" height="18" rx="6" fill="white"/>
      <path d="M9 22c0 7.18 5.82 13 13 13s13-5.82 13-13" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
      <line x1="22" y1="35" x2="22" y2="40" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="16" y1="40" x2="28" y2="40" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
    </svg>
  </div>
</div>

<!-- Status -->
<div class="status-label" id="statusLabel">Click the orb to start</div>

<!-- Volume meter -->
<div class="vol-bar-wrap" id="volWrap">
  <div class="vol-bar" id="volBar"></div>
</div>

<!-- Transcript -->
<div class="transcript-wrap">
  <div class="transcript-header">Transcript</div>
  <div class="transcript-body" id="transcriptBody">
    <div style="color:var(--muted);font-size:13px;margin:auto;text-align:center;">
      Your conversation will appear here
    </div>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <button class="btn primary" id="startBtn">Start</button>
  <button class="btn danger"  id="stopBtn" disabled>End Session</button>
</div>

<div class="footer">WebRTC · Deepgram Nova-3 · GPT-4.1-mini · OpenAI TTS-1</div>

<script>
// ─── State ─────────────────────────────────────────────────────────────────────
let ws          = null;
let pc          = null;
let localStream = null;
let micCtx      = null;   // AudioContext used only for the input volume meter
let analyser    = null;
let volRaf      = null;
let firstMsg    = true;

// ── TTS playback state ──────────────────────────────────────────────────────
// Audio chunks are no longer buffered into one big Blob and played after
// tts_end. Instead each binary WS message is:
//   [4 bytes turn_id][4 bytes seq_in_turn][mp3 chunk bytes]
// We decode each chunk as it arrives and schedule it on a single persistent
// AudioContext, gapless, using an ever-advancing "next start time" cursor.
// `currentTurnId` is the single source of truth for "what should be
// audible right now". Every async callback (decode, schedule, play) checks
// against it before doing anything observable, so a stale turn can NEVER
// produce sound after a newer turn has started or an interrupt fired —
// even if messages/promises resolve out of order.
let playCtx        = null;          // AudioContext for TTS playback (separate from mic meter ctx)
let currentTurnId  = -1;            // the only turn allowed to produce audio right now
let nextStartTime  = 0;             // when the next scheduled chunk should begin, in playCtx time
let activeSources  = [];            // currently scheduled/playing AudioBufferSourceNodes for the current turn
let turnMsgEl      = null;          // transcript bubble element for the in-progress agent turn

const orb            = document.getElementById("orb");
const statusLabel    = document.getElementById("statusLabel");
const volWrap        = document.getElementById("volWrap");
const volBar         = document.getElementById("volBar");
const transcriptBody = document.getElementById("transcriptBody");
const startBtn       = document.getElementById("startBtn");
const stopBtn        = document.getElementById("stopBtn");

// ─── Helpers ───────────────────────────────────────────────────────────────────
function setStatus(text, cls = "") {
  statusLabel.textContent = text;
  statusLabel.className   = "status-label" + (cls ? ` ${cls}` : "");
}

function setOrbState(state) {
  orb.className = `orb-wrap ${state}`;
}

function addMessage(text, speaker) {
  if (firstMsg) {
    transcriptBody.innerHTML = "";
    firstMsg = false;
  }
  const d = document.createElement("div");
  d.className = `msg ${speaker}`;
  d.innerHTML = `
    <span class="msg-label">${speaker === "user" ? "You" : "Agent"}</span>
    <div class="msg-bubble">${escapeHtml(text)}</div>
  `;
  transcriptBody.appendChild(d);
  transcriptBody.scrollTop = transcriptBody.scrollHeight;
  return d.querySelector(".msg-bubble");
}

function markBubbleInterrupted(bubbleEl) {
  if (bubbleEl) bubbleEl.classList.add("interrupted");
}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ─── Input volume meter (separate AudioContext from TTS playback) ───────────
function startVolMeter(stream) {
  micCtx = new AudioContext();
  analyser = micCtx.createAnalyser();
  analyser.fftSize = 256;
  const src = micCtx.createMediaStreamSource(stream);
  src.connect(analyser);
  const data = new Uint8Array(analyser.frequencyBinCount);
  volWrap.classList.add("active");

  function tick() {
    analyser.getByteFrequencyData(data);
    const avg = data.reduce((a, b) => a + b, 0) / data.length;
    volBar.style.width = Math.min(100, avg * 2) + "%";
    volRaf = requestAnimationFrame(tick);
  }
  volRaf = requestAnimationFrame(tick);
}

function stopVolMeter() {
  if (volRaf) cancelAnimationFrame(volRaf);
  volWrap.classList.remove("active");
  volBar.style.width = "0%";
  if (micCtx) { micCtx.close(); micCtx = null; }
}

// ─── TTS playback (streaming, turn-gated) ────────────────────────────────────

// ── Why the previous version still let old + new audio overlap ──────────────
// ws.onmessage called `handleAudioChunk(ev.data)` WITHOUT awaiting it. Each
// call was its own async function with its own `await ctx.decodeAudioData`.
// When 4-5 chunks arrive within a few ms (normal — the server streams 4KB
// chunks back-to-back), that produces 4-5 CONCURRENT decodes racing each
// other. Each one rechecked `turnId !== currentTurnId` after its own await,
// but that only guards that one chunk — it does nothing to stop a chunk
// whose decode happened to resolve and call `.start()` in the gap between
// "interrupt handler starts mutating state" and "this chunk's own check
// runs". With concurrent promises there's no guaranteed ordering there —
// that gap was the actual bug behind the overlapping audio.
//
// Fix, two parts:
//   1. A monotonic `playGen` counter, separate from turn_id, bumped FIRST
//      and SYNCHRONOUSLY inside onTtsStart/onInterrupt/resetTtsPlaybackState
//      before anything else runs. Any chunk whose closure captured an older
//      `playGen` is permanently stale with no race window — even with ten
//      decodes in flight, only chunks started under the CURRENT generation
//      can ever reach `.start()`.
//   2. Chunks are drained one at a time through `chunkQueue` instead of
//      firing concurrently — only one decodeAudioData() in flight ever, so
//      there's no concurrent-decode race to begin with, and chunk order is
//      preserved regardless of per-chunk decode time.
// `stopAllActiveSources()` also hard-mutes a shared gain node to 0 BEFORE
// calling .stop() on anything, so even a source that started in the same
// tick as the interrupt is silent immediately rather than for a few ms
// while .stop() takes effect.

let playGen       = 0;     // bumped on every interrupt / new turn / session stop
let chunkQueue     = [];   // pending {turnId, gen, mp3Bytes}, drained sequentially
let drainingQueue  = false;
let masterGain     = null; // all sources route through this, for instant hard-mute

function ensurePlayCtx() {
  if (!playCtx) {
    playCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = playCtx.createGain();
    masterGain.gain.value = 1;
    masterGain.connect(playCtx.destination);
  }
  // Browsers can suspend a context created/resumed outside a user gesture.
  // startSession() is itself triggered by a click, so this resume call is
  // inside that gesture chain and should succeed.
  if (playCtx.state === "suspended") {
    playCtx.resume().catch(() => {});
  }
  return playCtx;
}

// Hard, synchronous stop: mute instantly via gain, THEN stop every node.
// The gain drop to 0 happens in the same tick — no audible gap waiting on
// .stop()'s internal scheduling, and it covers any source that might start
// in the same tick as this call before its .stop() takes effect.
function stopAllActiveSources() {
  if (masterGain && playCtx) {
    masterGain.gain.cancelScheduledValues(playCtx.currentTime);
    masterGain.gain.setValueAtTime(0, playCtx.currentTime);
  }
  for (const src of activeSources) {
    try { src.stop(); } catch (e) { /* already stopped/ended — fine */ }
  }
  activeSources = [];
  chunkQueue = [];
  // Restore gain for the NEXT turn. Safe immediately — nothing is
  // connected/playing through it yet since activeSources is now empty.
  if (masterGain && playCtx) {
    masterGain.gain.setValueAtTime(1, playCtx.currentTime);
  }
}

function onTtsStart(turnId) {
  // Bump generation FIRST, synchronously — this is what makes every
  // in-flight chunk from the previous turn unconditionally stale the
  // instant this function starts running, with no race window.
  playGen += 1;

  if (turnMsgEl) markBubbleInterrupted(turnMsgEl);
  stopAllActiveSources();

  currentTurnId = turnId;
  const ctx = ensurePlayCtx();
  nextStartTime = ctx.currentTime;

  turnMsgEl = null; // will be set when the transcript text for this turn arrives
  setOrbState("speaking");
  setStatus("Agent speaking…", "speaking");
}

function onTtsEnd(turnId) {
  if (turnId !== currentTurnId) return; // stale tts_end for a superseded turn — ignore
  // Don't flip UI state here: the audio for this turn may still be playing
  // out (scheduled chunks can run past when the last byte arrived). The
  // last scheduled source's onended handler flips the UI back to listening.
  // If there were zero chunks at all (e.g. empty TTS), fall back here.
  if (activeSources.length === 0) {
    setOrbState("listening");
    setStatus("Listening…", "active");
  }
}

function onInterrupt(turnId) {
  // Bump generation FIRST — same reasoning as onTtsStart. This only fires
  // after the SERVER's VAD has already confirmed a real utterance (see
  // server.py VAD_MIN_SPEECH_FRAMES — short noise pops/breaths never reach
  // the point of sending "interrupt" at all), so by the time this runs,
  // background noise has already been ruled out upstream.
  playGen += 1;

  if (turnId === currentTurnId || turnId === -1) {
    if (turnMsgEl) markBubbleInterrupted(turnMsgEl);
  }
  stopAllActiveSources();
  setOrbState("listening");
  setStatus("Listening…", "active");
  currentTurnId = -1;
}

// Each binary WS message: [u32 turn_id][u32 seq_in_turn][mp3 bytes...]
// Chunks are queued and drained one at a time by drainChunkQueue() — never
// processed concurrently — so there's exactly one decodeAudioData() in
// flight at any moment and no race between "decode resolves" and
// "interrupt mutates shared state".
function handleAudioChunk(buf) {
  if (buf.byteLength < 8) return;
  const view   = new DataView(buf);
  const turnId = view.getUint32(0, false);  // big-endian, matches server's ">II"
  const mp3Bytes = buf.slice(8);

  if (turnId !== currentTurnId) return; // stale turn — never even queue it

  chunkQueue.push({ turnId, gen: playGen, mp3Bytes });
  if (!drainingQueue) drainChunkQueue();
}

async function drainChunkQueue() {
  drainingQueue = true;
  while (chunkQueue.length > 0) {
    const { turnId, gen, mp3Bytes } = chunkQueue.shift();

    // Stale before we even start decoding — skip without doing any work.
    if (gen !== playGen || turnId !== currentTurnId) continue;

    const ctx = ensurePlayCtx();
    let audioBuffer;
    try {
      audioBuffer = await ctx.decodeAudioData(mp3Bytes);
    } catch (e) {
      // A lone chunk slice isn't always independently decodable at MP3
      // frame boundaries. Skip it — causes a tiny glitch, not silence.
      console.warn("Chunk decode failed, skipping:", e);
      continue;
    }

    // Re-check AFTER the await. Because chunks are drained sequentially,
    // this is the only place staleness can be introduced mid-flight, and
    // only one such check is ever pending at a time — no race possible.
    if (gen !== playGen || turnId !== currentTurnId) continue;

    const source = ctx.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(masterGain);

    const startAt = Math.max(nextStartTime, ctx.currentTime);
    source.start(startAt);
    nextStartTime = startAt + audioBuffer.duration;

    activeSources.push(source);
    source.onended = () => {
      activeSources = activeSources.filter(s => s !== source);
      if (activeSources.length === 0 && turnId === currentTurnId && gen === playGen) {
        setOrbState("listening");
        setStatus("Listening…", "active");
      }
    };
  }
  drainingQueue = false;
}

function resetTtsPlaybackState() {
  playGen += 1;
  stopAllActiveSources();
  currentTurnId = -1;
  nextStartTime = 0;
  turnMsgEl = null;
}

// ─── WebSocket ────────────────────────────────────────────────────────────────
async function openWebSocket() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  const url   = `${proto}://${location.host}/ws`;
  ws          = new WebSocket(url);
  ws.binaryType = "arraybuffer";

  return new Promise((resolve, reject) => {
    ws.onopen    = () => resolve();
    ws.onerror   = (e) => reject(e);

    ws.onmessage = async (ev) => {
      if (ev.data instanceof ArrayBuffer) {
        handleAudioChunk(ev.data);
        return;
      }
      const msg = JSON.parse(ev.data);

      if (msg.type === "answer") {
        const answer = new RTCSessionDescription({ type: msg.sdp_type, sdp: msg.sdp });
        await pc.setRemoteDescription(answer);

      } else if (msg.type === "transcript") {
        const bubble = addMessage(msg.text, msg.speaker);
        if (msg.speaker === "agent") turnMsgEl = bubble;

      } else if (msg.type === "tts_start") {
        onTtsStart(msg.turn_id);

      } else if (msg.type === "tts_end") {
        onTtsEnd(msg.turn_id);

      } else if (msg.type === "interrupt") {
        onInterrupt(msg.turn_id);
      }
    };

    ws.onclose = () => {
      setStatus("Disconnected", "error");
      setOrbState("idle");
      resetUI();
    };
  });
}

// ─── WebRTC ────────────────────────────────────────────────────────────────────
async function startWebRTC(stream) {
  pc = new RTCPeerConnection({
    iceServers: [
      { urls: "stun:stun.l.google.com:19302" },
      { urls: "stun:stun1.l.google.com:19302" },
    ]
  });

  stream.getAudioTracks().forEach(t => pc.addTrack(t, stream));

  pc.onicecandidate = ({ candidate }) => {
    if (candidate && ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({
        type:      "ice_candidate",
        candidate: candidate.toJSON(),
      }));
    }
  };

  pc.onconnectionstatechange = () => {
    console.log("WebRTC state:", pc.connectionState);
    if (pc.connectionState === "connected") {
      setStatus("Listening…", "active");
      setOrbState("listening");
    } else if (["failed","disconnected","closed"].includes(pc.connectionState)) {
      setStatus("Connection lost", "error");
      setOrbState("error");
    }
  };

  const offer = await pc.createOffer({ offerToReceiveAudio: false, offerToReceiveVideo: false });
  await pc.setLocalDescription(offer);
  ws.send(JSON.stringify({ type: "offer", sdp: offer.sdp, sdp_type: offer.type }));
}

// ─── Session start / stop ─────────────────────────────────────────────────────
async function startSession() {
  startBtn.disabled = true;
  setStatus("Requesting microphone…", "");

  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation:   true,
        noiseSuppression:   true,
        autoGainControl:    true,
        channelCount:       1,
        sampleRate:         16000,
      },
      video: false
    });
  } catch(e) {
    setStatus("Microphone access denied", "error");
    setOrbState("error");
    startBtn.disabled = false;
    return;
  }

  setStatus("Connecting…", "");

  // Create/resume the playback AudioContext inside this click-triggered
  // handler so browser autoplay policies don't block TTS later.
  ensurePlayCtx();

  try {
    await openWebSocket();
    await startWebRTC(localStream);
    startVolMeter(localStream);
    stopBtn.disabled = false;
    setOrbState("listening");
    setStatus("Connecting WebRTC…", "active");
  } catch(e) {
    console.error(e);
    setStatus("Connection failed — is the server running?", "error");
    setOrbState("error");
    startBtn.disabled = false;
  }
}

function resetUI() {
  startBtn.disabled = false;
  stopBtn.disabled  = true;
  setOrbState("idle");
}

async function stopSession() {
  stopBtn.disabled = true;
  if (ws) { ws.send(JSON.stringify({ type: "close" })); ws.close(); ws = null; }
  if (pc) { pc.close(); pc = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  stopVolMeter();
  resetTtsPlaybackState();
  if (playCtx) { playCtx.close(); playCtx = null; }
  setStatus("Session ended", "");
  setOrbState("idle");
  resetUI();
}

// ─── Bind ─────────────────────────────────────────────────────────────────────
startBtn.addEventListener("click", startSession);
